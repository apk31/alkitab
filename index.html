<!DOCTYPE html>
<html>
<head>
    <title>Index Page</title>
    <script>
        let loading = false;
        
        // Function to handle arrow key navigation
        function handleArrowKeys(event) {
            if (loading) return; // Prevent race condition during loading state
            // Your navigation logic here
        }
        
        // Function to throttle button clicks
        const throttle = (func, limit) => {
            let lastFunc;
            let lastRan;
            return function() {
                const context = this;
                const args = arguments;
                if (!lastRan) {
                    func.apply(context, args);
                    lastRan = Date.now();
                } else {
                    clearTimeout(lastFunc);
                    lastFunc = setTimeout(function() {
                        if ((Date.now() - lastRan) >= limit) {
                            func.apply(context, args);
                            lastRan = Date.now();
                        }
                    }, limit - (Date.now() - lastRan));
                }
            };
        };
        
        // Example of restricting button clicks
        const clickButton = throttle(() => {
            // Your button click logic here
        }, 1000);
        
        document.addEventListener('keydown', handleArrowKeys);
        document.getElementById('myButton').addEventListener('click', clickButton);
    </script>
</head>
<body>
    <h1>Welcome to the Index Page!</h1>
    <button id="myButton">Click Me!</button>
</body>
</html>
